<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Propuesta ❤️</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      font-family: 'Quicksand', sans-serif;

      background: linear-gradient(
        180deg,
        rgba(255, 228, 236, 0.95),
        rgba(255, 192, 203, 0.75)
      );

      padding: 24px;
    }

    .contenedor {
      width: 100%;
      max-width: 600px;
      text-align: center;

      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(8px);

      border-radius: 24px;
      padding: 30px 20px;

      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    .imagen {
      width: 100%;
      max-width: 380px;
      height: auto;

      border-radius: 18px;

      margin: 12px auto;
      display: block;

      box-shadow: 0 4px 15px rgba(0,0,0,0.12);
    }

    .mensaje {
      margin: 28px 0;

      color: #6b4f5b;

      font-size: clamp(22px, 5vw, 34px);
      font-weight: 700;
      line-height: 1.5;
    }

    .mensaje-romantico-1 {
      font-family: 'Great Vibes', cursive;
      color: #9b59b6;
      font-size: clamp(36px, 8vw, 60px);
      line-height: 1.3;
      margin: 20px 0;
    }

    .mensaje-romantico-2 {
      font-family: 'Great Vibes', cursive;
      color: #8a2be2;
      font-size: clamp(36px, 8vw, 60px);
      line-height: 1.3;
      margin: 20px 0;
    }

    .corazon {
      font-size: 28px;
      margin: 15px 0;
    }
  </style>
</head>

<body>

  <div class="contenedor">

    <img
      src="corazones.png"
      alt="Imagen corazones"
      class="imagen"
    >
    
    <img
      src="20260311_215730.jpg"
      alt="Imagen nuestra"
      class="imagen"
    >

    <div class="mensaje-romantico-2">
      💕 Te amo mi vida ❤️
    </div>
    <div class="mensaje-romantico-1">
      Novios desde
    </div>
    <div class="mensaje-romantico-1">
      30/05/2026
    </div>

    <img
      src="flores.png"
      alt="Imagen flores"
      class="imagen"
    >

  </div>

</body>
</html>
